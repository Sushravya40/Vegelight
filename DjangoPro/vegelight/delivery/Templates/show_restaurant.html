<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
    <link href="{% static 'css/style.css' %}?v=1778515902" rel="stylesheet">
</head>
<body>
    
    <table border="1">
        <thead>
            <tr>
                <th>Restaurant name</th>
                <th>Picture</th>
                <th>Cuisine</th>
                <th>Rating</th>
                <th>Operations</th>
            </tr>
        </thead>
        <tbody>
            {%  for r in restaurantList %}
                <tr>
                    <td>{{ r.name }}</td>
                    <td>
                        <img src="{{ r.picture }}">
                    </td>
                    <td>{{ r.cuisine }}</td>
                    <td>{{ r.rating }}</td>
                    <td style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <a href="{% url 'open_update_restaurant' r.id %}" class="btn" style="padding: 0.5rem;">
                            Update Restaurant
                        </a>
                         <a href="{% url 'delete_restaurant' r.id %}" class="btn" style="padding: 0.5rem; background: linear-gradient(135deg, #ff4b4b 0%, #cc0000 100%);">
                            Delete Restaurant
                        </a>
                        <a href="{% url 'open_update_menu' r.id %}" class="btn" style="padding: 0.5rem; background: linear-gradient(135deg, #2b80ff 0%, #155bd5 100%);">
                            Update Menu
                        </a>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
    
</body>
</html>
